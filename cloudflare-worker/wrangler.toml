name = "flyer-cors-proxy"
main = "worker.js"
compatibility_date = "2025-01-01"

# FLYER_API_KEY must be set as a secret (never in this file):
#   wrangler secret put FLYER_API_KEY

# KV namespace for monthly query counter
# To create: npx wrangler kv namespace create QUERY_COUNTER
# Then replace the id below with the value returned
[[kv_namespaces]]
binding = "QUERY_COUNTER"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
